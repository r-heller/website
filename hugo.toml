baseURL = 'https://example.org/'
languageCode = 'en'
title = 'R Statistics Tutorials & Research'
theme = 'academic'

[params]
  description = 'Personal academic website featuring R statistical tutorials, research publications, and blog posts.'
  author = 'Your Name'
  dateFormat = 'January 2, 2006'

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = 'monokai'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'tutorials'
    name = 'R Tutorials'
    url = '/tutorials/'
    weight = 2
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/blog/'
    weight = 3
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 4
  [[menu.main]]
    identifier = 'publications'
    name = 'Publications'
    url = '/publications/'
    weight = 5
  [[menu.main]]
    identifier = 'impressum'
    name = 'Impressum'
    url = '/impressum/'
    weight = 6

[outputs]
  home = ['HTML', 'RSS']

[pagination]
  pagerSize = 10
