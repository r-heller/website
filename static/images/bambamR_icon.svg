<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgbam" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0e0b04"/>
    </linearGradient>
    <linearGradient id="club-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4409"/>
    </linearGradient>
    <clipPath id="hexbam">
      <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"/>
    </clipPath>
  </defs>

  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145" fill="url(#bgbam)"/>

  <g clip-path="url(#hexbam)">

    <!-- Stone texture cracks -->
    <path d="M120,145 Q135,180 128,220 Q122,255 140,290" fill="none" stroke="#FAC775" stroke-width="0.5" opacity="0.06"/>
    <path d="M320,150 Q305,200 315,240 Q328,280 310,330" fill="none" stroke="#FAC775" stroke-width="0.5" opacity="0.06"/>
    <path d="M200,400 Q230,420 260,410 Q290,398 330,415" fill="none" stroke="#FAC775" stroke-width="0.5" opacity="0.05"/>
    <path d="M80,300 Q100,285 95,310 Q88,330 110,345" fill="none" stroke="#FAC775" stroke-width="0.5" opacity="0.05"/>
    <path d="M400,350 Q420,335 415,360 Q408,380 430,370" fill="none" stroke="#FAC775" stroke-width="0.5" opacity="0.05"/>

    <!-- DNA double helix left strand (ochre) -->
    <path d="M148,430 Q165,405 148,380 Q131,355 148,330 Q165,305 148,280 Q131,255 148,230 Q165,205 148,180 Q131,155 148,145"
      fill="none" stroke="#EF9F27" stroke-width="2.8" opacity="0.85" stroke-linecap="round"/>
    <!-- DNA double helix right strand (coral) -->
    <path d="M188,430 Q171,405 188,380 Q205,355 188,330 Q171,305 188,280 Q205,255 188,230 Q171,205 188,180 Q205,155 188,145"
      fill="none" stroke="#D85A30" stroke-width="2.8" opacity="0.85" stroke-linecap="round"/>
    <!-- Rungs -->
    <line x1="148" y1="417" x2="188" y2="417" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="392" x2="188" y2="392" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="367" x2="188" y2="367" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="342" x2="188" y2="342" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="317" x2="188" y2="317" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="292" x2="188" y2="292" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="267" x2="188" y2="267" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="242" x2="188" y2="242" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="217" x2="188" y2="217" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="192" x2="188" y2="192" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>
    <line x1="148" y1="167" x2="188" y2="167" stroke="#FAC775" stroke-width="1.8" opacity="0.6"/>

    <!-- Impact starburst -->
    <line x1="188" y1="267" x2="222" y2="248" stroke="#EF9F27" stroke-width="1.5" opacity="0.7"/>
    <line x1="188" y1="267" x2="228" y2="270" stroke="#EF9F27" stroke-width="1.5" opacity="0.7"/>
    <line x1="188" y1="267" x2="215" y2="292" stroke="#EF9F27" stroke-width="1.5" opacity="0.6"/>
    <line x1="188" y1="267" x2="220" y2="258" stroke="#FAC775" stroke-width="1"  opacity="0.5"/>
    <line x1="188" y1="267" x2="218" y2="280" stroke="#FAC775" stroke-width="1"  opacity="0.5"/>
    <circle cx="226" cy="246" r="2" fill="#EF9F27" opacity="0.7"/>
    <circle cx="232" cy="270" r="2" fill="#EF9F27" opacity="0.65"/>
    <circle cx="218" cy="295" r="1.5" fill="#FAC775" opacity="0.6"/>

    <!-- Club handle -->
    <rect x="248" y="188" width="14" height="115" rx="5" fill="url(#club-g)" transform="rotate(-38 255 245)"/>
    <!-- Club head -->
    <ellipse cx="318" cy="196" rx="38" ry="30" fill="#6B4F10" transform="rotate(-38 318 196)"/>
    <ellipse cx="318" cy="196" rx="30" ry="23" fill="#8B6914" transform="rotate(-38 318 196)"/>
    <!-- Knobs -->
    <circle cx="330" cy="172" r="8"  fill="#5C4409" opacity="0.9"/>
    <circle cx="340" cy="188" r="6"  fill="#6B4F10" opacity="0.85"/>
    <circle cx="302" cy="178" r="7"  fill="#5C4409" opacity="0.85"/>
    <circle cx="335" cy="206" r="5"  fill="#6B4F10" opacity="0.8"/>
    <circle cx="308" cy="200" r="4"  fill="#5C4409" opacity="0.75"/>
    <ellipse cx="310" cy="182" rx="12" ry="7" fill="#A07820" opacity="0.3" transform="rotate(-38 310 182)"/>

    <!-- Pipeline petroglyphs -->
    <!-- FASTQ -->
    <path d="M340,175 Q348,170 356,175 Q364,180 372,175" fill="none" stroke="#FAC775" stroke-width="1.5" opacity="0.55" stroke-linecap="round"/>
    <path d="M340,182 Q348,177 356,182 Q364,187 372,182" fill="none" stroke="#FAC775" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>
    <text font-family="monospace" font-size="8" fill="#FAC775" opacity="0.45" x="340" y="194">FASTQ</text>
    <line x1="356" y1="197" x2="356" y2="208" stroke="#FAC775" stroke-width="1" opacity="0.35"/>
    <polygon points="352,207 356,214 360,207" fill="#FAC775" opacity="0.35"/>

    <!-- QC -->
    <path d="M348,217 Q356,213 364,217 L364,228 Q356,234 348,228 Z" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.6"/>
    <text font-family="monospace" font-size="8" fill="#1D9E75" opacity="0.55" x="344" y="242">QC</text>
    <line x1="356" y1="245" x2="356" y2="256" stroke="#FAC775" stroke-width="1" opacity="0.35"/>
    <polygon points="352,255 356,262 360,255" fill="#FAC775" opacity="0.35"/>

    <!-- Align -->
    <line x1="344" y1="265" x2="368" y2="265" stroke="#7F77DD" stroke-width="2" opacity="0.65" stroke-linecap="round"/>
    <line x1="344" y1="272" x2="362" y2="272" stroke="#7F77DD" stroke-width="2" opacity="0.5"  stroke-linecap="round"/>
    <text font-family="monospace" font-size="8" fill="#7F77DD" opacity="0.55" x="340" y="285">ALIGN</text>
    <line x1="356" y1="288" x2="356" y2="299" stroke="#FAC775" stroke-width="1" opacity="0.35"/>
    <polygon points="352,298 356,305 360,298" fill="#FAC775" opacity="0.35"/>

    <!-- Count -->
    <rect x="345" y="308" width="5" height="14" fill="#D85A30" opacity="0.65"/>
    <rect x="353" y="303" width="5" height="19" fill="#D85A30" opacity="0.65"/>
    <rect x="361" y="311" width="5" height="11" fill="#D85A30" opacity="0.65"/>
    <text font-family="monospace" font-size="8" fill="#D85A30" opacity="0.55" x="341" y="330">COUNT</text>
    <line x1="356" y1="333" x2="356" y2="344" stroke="#FAC775" stroke-width="1" opacity="0.35"/>
    <polygon points="352,343 356,350 360,343" fill="#FAC775" opacity="0.35"/>

    <!-- DEG -->
    <circle cx="356" cy="363" r="3" fill="#D4537E" opacity="0.7"/>
    <line x1="356" y1="360" x2="350" y2="350" stroke="#D4537E" stroke-width="1" opacity="0.55"/>
    <line x1="356" y1="360" x2="362" y2="350" stroke="#EF9F27" stroke-width="1" opacity="0.55"/>
    <text font-family="monospace" font-size="8" fill="#D4537E" opacity="0.55" x="344" y="378">DEG</text>

    <!-- Ghost BAM! -->
    <text font-family="Georgia, serif" font-weight="700" font-size="52"
      fill="#EF9F27" text-anchor="middle" x="168" y="478" opacity="0.12"
      transform="rotate(-8 168 460)">BAM!</text>

  </g>

  <!-- Hex border -->
  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"
    fill="none" stroke="#854F0B" stroke-width="11" stroke-linejoin="round"/>
  <polygon points="250,44 441,153 441,367 250,476 59,367 59,153"
    fill="none" stroke="#633806" stroke-width="1.5" stroke-linejoin="round" opacity="0.7"/>

  <!-- Package name -->
  <text font-family="monospace" font-weight="700" font-size="27"
    fill="#FAC775" text-anchor="middle" x="250" y="545" letter-spacing="1">bambamR</text>
</svg>
