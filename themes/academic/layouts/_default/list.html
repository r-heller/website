{{ define "main" }}
<section class="list-page">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="list-items">
    {{ range .Pages }}
    <article class="list-item">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      {{ with .Date }}<time>{{ . | time.Format $.Site.Params.dateFormat }}</time>{{ end }}
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
</section>
{{ end }}
