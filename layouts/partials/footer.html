<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
    <p class="footer-links">
      <a href="{{ "legal/impressum/" | relURL }}">Impressum</a> &middot;
      <a href="{{ "legal/datenschutz/" | relURL }}">Datenschutz</a> &middot;
      <a href="{{ "legal/haftungsausschluss/" | relURL }}">Haftungsausschluss</a>
    </p>
  </div>
</footer>
<script>
document.querySelector('.menu-toggle').addEventListener('click', function() {
  document.querySelector('.site-nav').classList.toggle('open');
});
document.querySelectorAll('.nav-dropdown-toggle').forEach(function(t) {
  t.addEventListener('click', function(e) {
    e.preventDefault();
    var parent = t.parentElement;
    var open = parent.classList.toggle('open');
    t.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
});
document.addEventListener('click', function(e) {
  document.querySelectorAll('.nav-dropdown.open').forEach(function(d) {
    if (!d.contains(e.target)) {
      d.classList.remove('open');
      var t = d.querySelector('.nav-dropdown-toggle');
      if (t) t.setAttribute('aria-expanded', 'false');
    }
  });
});
</script>
